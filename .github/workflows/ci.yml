name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --release -p operon-core

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e sdk/python
      - run: python -m unittest discover -s sdk/python/tests -v

  swift:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - run: cargo build --release -p operon-core
      - run: scripts/build-apple-xcframework.sh
      - run: scripts/verify-apple-xcframework.sh
      - run: xcrun swift-format lint --recursive sdk/swift/Sources sdk/swift/Tests sdk/swift/Package.swift
      - run: xcrun swift test --package-path sdk/swift
      - run: cd sdk/swift && xcodebuild -quiet -scheme OperonFoundationModels -destination 'generic/platform=iOS Simulator' build
